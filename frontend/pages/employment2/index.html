<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生就业管理</title>
    <link rel="stylesheet" href="/static/css/common.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>学生管理系统</h2>
            <ul>
                <li><a href="/">首页</a></li>
                <li><a href="/pages/student/">学生管理</a></li>
                <li><a href="/pages/score/">成绩管理</a></li>
                <li><a href="/pages/employment/">就业模块</a></li>
                <li><a href="/pages/employment2/" class="active">学生就业管理</a></li>
                <li><a href="/pages/teacher/">老师管理</a></li>
                <li><a href="/pages/class/">班级管理</a></li>
                <li><a href="/pages/student2/">学生管理2</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="header">
                <h1>学生就业管理</h1>
            </div>
            <div class="content-card">
                <div class="search-bar">
                    <div class="form-group">
                        <label>学号</label>
                        <input type="text" id="search_student_no" placeholder="请输入学号">
                    </div>
                    <div class="form-group">
                        <label>班级ID</label>
                        <input type="number" id="search_class_id" placeholder="请输入班级ID">
                    </div>
                    <div class="form-group">
                        <label>公司名称</label>
                        <input type="text" id="search_company" placeholder="请输入公司名称">
                    </div>
                    <div class="form-group">
                        <label>最低薪资</label>
                        <input type="number" id="search_salary_min" placeholder="最低薪资">
                    </div>
                    <div class="form-group">
                        <label>最高薪资</label>
                        <input type="number" id="search_salary_max" placeholder="最高薪资">
                    </div>
                    <button class="btn btn-primary" onclick="searchEmployments()">查询</button>
                    <button class="btn btn-success" onclick="openAddModal()">新增就业</button>
                    <button class="btn btn-secondary" onclick="openRestoreModal()">恢复删除</button>
                </div>
                <table id="employment_table">
                    <thead>
                        <tr>
                            <th>就业ID</th>
                            <th>学号</th>
                            <th>学生姓名</th>
                            <th>班级ID</th>
                            <th>就业开放时间</th>
                            <th>Offer时间</th>
                            <th>公司名称</th>
                            <th>薪资</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="employment_tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="employment_modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal_title">新增就业信息</h3>
                <button class="modal-close" onclick="closeModal('employment_modal')">&times;</button>
            </div>
            <form id="employment_form">
                <input type="hidden" id="edit_student_no">
                <div class="form-group">
                    <label>学生编号 *</label>
                    <input type="text" id="form_student_no" required>
                </div>
                <div class="form-group">
                    <label>学生姓名 *</label>
                    <input type="text" id="form_student_name" required>
                </div>
                <div class="form-group">
                    <label>班级ID *</label>
                    <input type="number" id="form_class_id" required>
                </div>
                <div class="form-group">
                    <label>就业开放时间</label>
                    <input type="datetime-local" id="form_job_open_time">
                </div>
                <div class="form-group">
                    <label>Offer时间</label>
                    <input type="datetime-local" id="form_offer_send_time">
                </div>
                <div class="form-group">
                    <label>公司名</label>
                    <input type="text" id="form_company_name">
                </div>
                <div class="form-group">
                    <label>薪资</label>
                    <input type="number" id="form_salary">
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('employment_modal')">取消</button>
                <button class="btn btn-primary" onclick="saveEmployment()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="restore_modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>恢复已删除就业信息</h3>
                <button class="modal-close" onclick="closeModal('restore_modal')">&times;</button>
            </div>
            <form id="restore_form">
                <div class="form-group">
                    <label>学号</label>
                    <input type="text" id="restore_student_no" placeholder="请输入学号">
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('restore_modal')">取消</button>
                <button class="btn btn-primary" onclick="recoverEmploymentById()">恢复</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js?v=5"></script>
    <script src="/static/js/common.js?v=5"></script>
    <script src="/static/pages/employment2/js/employment2.js?v=5"></script>
</body>
</html>
