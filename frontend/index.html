<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <script src="/static/js/auth-guard.js"></script>
    <style>
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-name {
            color: #666;
            font-size: 14px;
        }
        .btn-logout {
            padding: 8px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-logout:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>学生管理系统</h2>
            <ul>
                <li><a href="/" class="active">首页</a></li>
                <li><a href="/pages/student/">学生管理</a></li>
                <li><a href="/pages/score/">成绩管理</a></li>
                <li><a href="/pages/employment/">就业管理</a></li>
                <li><a href="/pages/teacher/">老师管理</a></li>
                <li><a href="/pages/class/">班级管理</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="header">
                <h1>欢迎来到学生管理系统</h1>
                <div class="user-info">
                    <span class="user-name" id="user-display-name"></span>
                    <button class="btn-logout" onclick="logout()">退出登录</button>
                </div>
            </div>
            <div class="content-card">
                <div class="stat-cards">
                    <div class="stat-card">
                        <h4>学生管理</h4>
                        <p>学生的增删改查、恢复、年龄/性别统计</p>
                    </div>
                    <div class="stat-card">
                        <h4>成绩管理</h4>
                        <p>成绩的增删改查、恢复、统计分析</p>
                    </div>
                    <div class="stat-card">
                        <h4>就业管理</h4>
                        <p>就业信息的增删改查、薪资查询、统计</p>
                    </div>
                    <div class="stat-card">
                        <h4>老师管理</h4>
                        <p>老师的增删改查、恢复、性别统计</p>
                    </div>
                    <div class="stat-card">
                        <h4>班级管理</h4>
                        <p>班级的增删改查、恢复、月度统计</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        var user = getCurrentUser();
        if (user) {
            var roleNames = {admin: '管理员', homeroom: '班主任', teacher: '任课老师'};
            document.getElementById('user-display-name').textContent = user.real_name + ' (' + (roleNames[user.role] || user.role) + ')';
        }
    </script>
</body>
</html>
